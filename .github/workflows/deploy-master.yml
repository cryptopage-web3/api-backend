name: Remote deploy master
on:
  push:
    branches:
      - git-workflow

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Check vars
      run: |
        echo "${{ secrets.PROD_SSH_HOST }}, ${{ vars.PROD_SSH_USER }}" | sed 's/./& /g'
        echo "var: ${{ vars.DEPLOY_DIR }}, env: $DEPLOY_DIR"
        ls -l
    - uses: actions/checkout@v3
    - name: Copy deploy script to server ${{ secrets.PROD_SSH_HOST }}
      uses: garygrossgarten/github-action-scp@release
      with:
        local: deploy/utils.sh
        remote: /tmp/github-utils.sh
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ vars.PROD_SSH_USER }}
        privateKey: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
    - name: Executing deploy script on server
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        script: /bin/bash /tmp/deploy.sh > ${{ env.DEPLOY_LOG_FILE }}